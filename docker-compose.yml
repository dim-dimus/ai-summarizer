services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: summarizer
      POSTGRES_USER: summarizer
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summarizer"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: php artisan serve --host=0.0.0.0 --port=8000
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy

  # Queue worker: same image/codebase as the API, runs the async pipeline.
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    command: php artisan queue:work --tries=3 --backoff=10 --timeout=120
    working_dir: /var/www/html
    volumes:
      - ./api:/var/www/html
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
