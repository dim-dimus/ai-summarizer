openapi: 3.0.3
info:
  title: AI Summarizer API
  version: 0.1.0
  description: >
    Async summarization API. Summaries are created (202), processed by a worker via
    SQS, and fetched by polling until status is `completed` or `failed`.

servers:
  - url: https://api.example.com
    description: Production
  - url: http://localhost:8000
    description: Local

security:
  - bearerAuth: []

paths:
  /api/auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/auth/login:
    post:
      summary: Log in and obtain a token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /api/summaries:
    get:
      summary: List the authenticated user's summaries (paginated)
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: per_page, schema: { type: integer, default: 15, maximum: 50 } }
        - in: query
          name: status
          schema: { type: string, enum: [pending, processing, completed, failed] }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Summary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      summary: Create a summary (async). Returns 202 with a pending resource.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [source_type, style]
              properties:
                source_type: { type: string, enum: [url, text] }
                url:
                  type: string
                  format: uri
                  description: Required when source_type=url
                text:
                  type: string
                  maxLength: 50000
                  description: Required when source_type=text
                style: { type: string, enum: [tldr, bullets, short] }
              example:
                source_type: url
                url: https://example.com/some-article
                style: tldr
      responses:
        '202':
          description: Accepted — processing queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Summary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /api/summaries/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: integer } }
    get:
      summary: Get one summary (poll this for status/result)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Summary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Delete one summary
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/admin/summaries:
    get:
      summary: (Admin) List all summaries across users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Summary' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/admin/users:
    get:
      summary: (Admin) List all users
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/admin/stats:
    get:
      summary: (Admin) Aggregate token + cost usage
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_summaries: { type: integer }
                  total_input_tokens: { type: integer }
                  total_output_tokens: { type: integer }
                  total_cost_usd: { type: number, format: float }
                  by_status:
                    type: object
                    additionalProperties: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [user, admin] }
        created_at: { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }

    Summary:
      type: object
      properties:
        id: { type: integer }
        source_type: { type: string, enum: [url, text] }
        source_url: { type: string, nullable: true }
        title: { type: string, nullable: true }
        style: { type: string, enum: [tldr, bullets, short] }
        status: { type: string, enum: [pending, processing, completed, failed] }
        result_text: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        model: { type: string, nullable: true }
        input_tokens: { type: integer, nullable: true }
        output_tokens: { type: integer, nullable: true }
        cost_usd: { type: number, format: float, nullable: true }
        created_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time, nullable: true }

    PaginationMeta:
      type: object
      properties:
        current_page: { type: integer }
        per_page: { type: integer }
        total: { type: integer }
        last_page: { type: integer }

    Error:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Not allowed (admin only)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
